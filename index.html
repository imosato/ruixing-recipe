<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>瑞幸配方记忆助手</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f0eb;--card:#ffffff;--primary:#1a3a4a;--accent:#c8a87c;--text:#2c2c2c;--text-light:#6b6b6b;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:16px}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px;max-width:600px;margin:0 auto}
  header{background:linear-gradient(135deg,#1a3a4a 0%,#2a5a6a 100%);color:white;padding:20px 16px 16px;position:sticky;top:0;z-index:100;border-radius:0 0 16px 16px}
  header h1{font-size:20px;font-weight:700}
  header p{font-size:13px;opacity:0.7;margin-top:4px}
  .tab-bar{display:flex;background:var(--card);border-bottom:1px solid #eee;position:sticky;top:76px;z-index:99}
  .tab-btn{flex:1;padding:12px 8px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text-light);cursor:pointer;transition:all .2s;position:relative}
  .tab-btn.active{color:var(--primary);font-weight:600}
  .tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--accent);border-radius:3px 3px 0 0}
  .panel{display:none;padding:16px}
  .panel.active{display:block}
  .flashcard-area{max-width:480px;margin:0 auto}
  .progress-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--text-light)}
  .progress-track{flex:1;height:4px;background:#e0d8d0;border-radius:4px;margin:0 12px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
  .card-wrapper{perspective:1000px;margin-bottom:16px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;min-height:320px;cursor:pointer;transition:transform .3s}
  .card:active{transform:scale(.98)}
  .card .side{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:280px}
  .card .back{text-align:left;align-items:stretch}
  .card-category{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:12px;color:white}
  .card-name{font-size:24px;font-weight:700;margin-bottom:12px;color:var(--primary)}
  .card-hint{font-size:13px;color:var(--text-light)}
  .recipe-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f0ece8;font-size:14px;line-height:1.6}
  .recipe-row:last-child{border-bottom:none}
  .recipe-temp{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;min-width:32px;text-align:center;flex-shrink:0;margin-top:2px}
  .temp-cold{background:#d4e0f0;color:#3a6a8a}.temp-hot{background:#f0ddd4;color:#a04a2a}
  .recipe-formula{color:var(--text);flex:1;font-size:13px}
  .recipe-note{margin-top:8px;padding:8px 12px;background:#f8f4ef;border-radius:8px;font-size:12px;color:var(--text-light);line-height:1.5}
  .tap-hint{text-align:center;font-size:12px;color:var(--text-light);margin-top:8px;opacity:.6}
  .card-nav{display:flex;gap:12px;margin-top:4px}
  .card-nav button{flex:1;padding:12px;border:2px solid #e0d8d0;border-radius:12px;background:var(--card);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s}
  .card-nav button:active{transform:scale(.96)}
  .card-nav button.knew{border-color:#6a9a5a;color:#6a9a5a}
  .card-nav button.forgot{border-color:#d4724a;color:#d4724a}
  .mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;max-width:480px;margin-left:auto;margin-right:auto}
  .mode-btn{padding:10px 12px;border:2px solid #e0d8d0;border-radius:12px;background:var(--card);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;color:var(--text)}
  .mode-btn.active{border-color:var(--accent);background:#faf6f0}
  .stats-bar{display:flex;gap:12px;padding:12px 16px;background:var(--card);margin:0 0 12px;border-radius:12px;box-shadow:var(--shadow);justify-content:space-around;max-width:480px;margin-left:auto;margin-right:auto}
  .stat-item{text-align:center}.stat-num{font-size:20px;font-weight:700;color:var(--primary)}.stat-label{font-size:11px;color:var(--text-light);margin-top:2px}
  .sr-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px}
  .sr-new{background:#e8d5b8;color:#8a6a3a}.sr-learning{background:#d4e0f0;color:#3a6a8a}.sr-review{background:#d8e8d0;color:#3a6a3a}.sr-known{background:#e0d8d0;color:#5a5a5a}
  .quiz-area{max-width:480px;margin:0 auto}
  .quiz-question{font-size:18px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--primary)}
  .quiz-sub{text-align:center;font-size:13px;color:var(--text-light);margin-bottom:20px}
  .quiz-options{display:flex;flex-direction:column;gap:10px}
  .quiz-option{padding:14px 16px;border:2px solid #e0d8d0;border-radius:12px;background:var(--card);font-size:15px;cursor:pointer;transition:all .2s;text-align:center}
  .quiz-option:active{transform:scale(.97)}
  .quiz-option.correct{border-color:#6a9a5a;background:#eef5ea;color:#3a6a2a}
  .quiz-option.wrong{border-color:#d4724a;background:#f5ede8;color:#a0522a}
  .quiz-option.disabled{pointer-events:none;opacity:.7}
  .quiz-option.revealed{border-color:#6a9a5a;background:#eef5ea;color:#3a6a2a}
  .quiz-next-btn{margin-top:16px;padding:14px;width:100%;border:none;border-radius:12px;background:var(--primary);color:white;font-size:15px;font-weight:600;cursor:pointer}
  .quiz-score{text-align:center;margin-bottom:16px;font-size:14px;color:var(--text-light)}
  .browse-header{display:flex;gap:8px;margin-bottom:16px}
  .browse-header input{flex:1;padding:10px 14px;border:2px solid #e0d8d0;border-radius:12px;font-size:14px;background:var(--card);outline:none}
  .browse-header input:focus{border-color:var(--accent)}
  .browse-header select{padding:10px 12px;border:2px solid #e0d8d0;border-radius:12px;font-size:13px;background:var(--card);outline:none;color:var(--text)}
  .browse-list{display:flex;flex-direction:column;gap:10px}
  .browse-item{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
  .browse-item:active{transform:scale(.98)}
  .browse-item .bi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .browse-item .bi-name{font-size:16px;font-weight:600}
  .browse-item .bi-cat{font-size:11px;padding:2px 10px;border-radius:20px;color:white;font-weight:600}
  .browse-item .bi-summary{font-size:13px;color:var(--text-light);line-height:1.4;margin-top:4px}
  .browse-item .bi-expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0ece8}
  .browse-item .bi-expand.open{display:block}
  .browse-empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px}
  .reset-btn{display:block;margin:16px auto;padding:8px 20px;border:1.5px solid #ddd;border-radius:20px;background:transparent;font-size:12px;color:var(--text-light);cursor:pointer}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card,.quiz-option,.browse-item{animation:fadeIn .25s ease-out}
</style>
</head>
<body>
<header><h1>☕ 瑞幸配方记忆助手</h1><p>点卡翻面 · 自测巩固</p></header>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="flashcard">📇 记忆卡</button>
  <button class="tab-btn" data-tab="quiz">✍️ 自测</button>
  <button class="tab-btn" data-tab="browse">📋 配方库</button>
</div>

<div id="panel-flashcard" class="panel active">
  <div class="flashcard-area">
    <div class="mode-selector">
      <button class="mode-btn active" data-fmode="all">全部</button>
      <button class="mode-btn" data-fmode="random">随机</button>
      <button class="mode-btn" data-fmode="weak">易忘题</button>
      <button class="mode-btn" data-fmode="category">按分类</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="stat-total">0</div><div class="stat-label">配方总数</div></div>
      <div class="stat-item"><div class="stat-num" id="stat-known">0</div><div class="stat-label">已掌握</div></div>
      <div class="stat-item"><div class="stat-num" id="stat-learning">0</div><div class="stat-label">学习中</div></div>
      <div class="stat-item"><div class="stat-num" id="stat-weak">0</div><div class="stat-label">待复习</div></div>
    </div>
    <div class="progress-bar">
      <span id="card-index">1/1</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span id="card-sr-badge" style="font-size:12px"></span>
    </div>
    <div class="card-wrapper"><div class="card" id="flashcard">
      <div class="side front" id="card-front"><div class="card-category" id="fc-cat">分类</div><div class="card-name" id="fc-name">饮品名称</div><div class="card-hint">👆 点我查看配方</div></div>
      <div class="side back" id="card-back" style="display:none"><div id="fc-recipe-detail"></div></div>
    </div></div>
    <div class="tap-hint">👆 点击卡片翻转</div>
    <div class="card-nav">
      <button class="forgot" id="btn-forgot">😅 忘了</button>
      <button class="knew" id="btn-knew">✅ 记住了</button>
    </div>
  </div>
</div>

<div id="panel-quiz" class="panel">
  <div class="quiz-area">
    <div class="mode-selector" style="grid-template-columns:1fr 1fr 1fr">
      <button class="mode-btn active" data-qmode="category">猜分类</button>
      <button class="mode-btn" data-qmode="name">猜名称</button>
      <button class="mode-btn" data-qmode="recipe">猜配方</button>
    </div>
    <div class="quiz-score">正确:<strong id="quiz-correct">0</strong>/总:<strong id="quiz-total">0</strong></div>
    <div id="quiz-container"></div>
  </div>
</div>

<div id="panel-browse" class="panel">
  <div class="browse-header">
    <input type="text" id="browse-search" placeholder="🔍 搜索饮品...">
    <select id="browse-filter"><option value="all">全部分类</option></select>
  </div>
  <div class="browse-list" id="browse-list"></div>
</div>
<button class="reset-btn" id="reset-btn">🔄 重置学习进度</button>

const CATEGORIES=[...new Set(RECIPES.map(r=>r.category))];
document.getElementById('browse-filter').innerHTML='<option value="all">全部分类</option>'+CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');

function loadSR(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{}}catch(e){}return{}}
function saveSR(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function getSR(id){const d=loadSR();if(!d[id])d[id]={id,level:0,nextReview:0,totalCorrect:0,totalAttempts:0};return d[id]}
function updateSR(id,ok){const d=loadSR();if(!d[id])d[id]={id,level:0,nextReview:0,totalCorrect:0,totalAttempts:0};const s=d[id];s.totalAttempts++;if(ok){s.totalCorrect++;s.level=Math.min(s.level+1,5);const t=[6e4,6e5,864e5,2592e5,6048e5,12096e5];s.nextReview=Date.now()+(t[s.level]||t[5])}else{s.level=Math.max(s.level-1,0);s.nextReview=Date.now()+6e4}saveSR(d)}
function getSRStatus(s){if(s.totalAttempts===0)return{label:'新',cls:'sr-new'};if(s.level<=1)return{label:'学习中',cls:'sr-learning'};if(s.level<=3)return{label:'复习中',cls:'sr-review'};return{label:'已掌握',cls:'sr-known'}}
function getDueCards(){return RECIPES.filter(r=>{const s=getSR(r.id);return s.nextReview<=Date.now()||s.totalAttempts===0})}
function getWeakCards(){return RECIPES.filter(r=>{const s=getSR(r.id);return s.totalAttempts>0&&s.level<=1})}
function resetAllSR(){saveSR({});updateStats()}

let fcQueue=[],fcIndex=0,fcShowing=false,fcMode='all';
function buildQueue(){const w=getWeakCards().map(r=>r.id);switch(fcMode){case'all':fcQueue=RECIPES.map(r=>r.id);break;case'random':fcQueue=[...RECIPES.map(r=>r.id)].sort(()=>Math.random()-.5);break;case'weak':fcQueue=w.length?w:RECIPES.map(r=>r.id);break;case'category':{const cat=prompt('选分类：'+CATEGORIES.join('、'),CATEGORIES[0]);fcQueue=cat&&CATEGORIES.includes(cat)?RECIPES.filter(r=>r.category===cat).map(r=>r.id):RECIPES.map(r=>r.id);break}default:fcQueue=RECIPES.map(r=>r.id)}fcIndex=0;fcShowing=false;showCard()}
function showCard(){if(!fcQueue.length){buildQueue();return}if(fcIndex>=fcQueue.length)fcIndex=0;const r=RECIPES.find(d=>d.id===fcQueue[fcIndex]);if(!r){fcIndex++;showCard();return}const sr=getSR(r.id),st=getSRStatus(sr);document.getElementById('card-index').textContent=`${fcIndex+1}/${fcQueue.length}`;document.getElementById('progress-fill').style.width=`${((fcIndex+1)/fcQueue.length)*100}%`;const b=document.getElementById('card-sr-badge');b.textContent=st.label;b.className='sr-badge '+st.cls;document.getElementById('fc-cat').textContent=r.category;document.getElementById('fc-name').textContent=r.name;let h=`<div class="card-name" style="font-size:18px;margin-bottom:14px;text-align:center">${r.name}</div>`;if(r.cold)h+=`<div class="recipe-row"><span class="recipe-temp temp-cold">❄️</span><span class="recipe-formula">${r.cold}</span></div>`;if(r.hot)h+=`<div class="recipe-row"><span class="recipe-temp temp-hot">🔥</span><span class="recipe-formula">${r.hot}</span></div>`;if(r.note)h+=`<div class="recipe-note">${r.note}</div>`;document.getElementById('fc-recipe-detail').innerHTML=h;showFront();updateStats()}
function showFront(){document.getElementById('card-front').style.display='flex';document.getElementById('card-back').style.display='none';fcShowing=false}
function showBack(){document.getElementById('card-front').style.display='none';document.getElementById('card-back').style.display='flex';fcShowing=true}
document.getElementById('flashcard').addEventListener('click',()=>fcShowing?showFront():showBack());
document.getElementById('btn-knew').addEventListener('click',e=>{e.stopPropagation();updateSR(fcQueue[fcIndex],true);fcIndex++;if(fcIndex>=fcQueue.length){if(fcMode==='weak'&&getWeakCards().length)buildQueue();else{fcIndex=0;if(fcMode==='random')fcQueue=[...RECIPES.map(r=>r.id)].sort(()=>Math.random()-.5)}}fcShowing=false;showCard()});
document.getElementById('btn-forgot').addEventListener('click',e=>{e.stopPropagation();updateSR(fcQueue[fcIndex],false);fcIndex++;if(fcIndex>=fcQueue.length){if(fcMode==='weak'&&getWeakCards().length)buildQueue();else{fcIndex=0;if(fcMode==='random')fcQueue=[...RECIPES.map(r=>r.id)].sort(()=>Math.random()-.5)}}fcShowing=false;showCard()});

let qMode='category',qQueue=[],qIdx=0,qCorrect=0,qTotal=0,qAnswered=false;
function buildQuiz(){qQueue=[...RECIPES].sort(()=>Math.random()-.5);qIdx=0;qCorrect=0;qTotal=0;qAnswered=false;document.getElementById('quiz-correct').textContent='0';document.getElementById('quiz-total').textContent='0';showQuestion()}
function showQuestion(){if(qIdx>=qQueue.length){document.getElementById('quiz-container').innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:16px">🎉</div><div style="font-size:20px;font-weight:600">全部答完!</div><div style="margin:12px 0;font-size:16px;color:var(--text-light)">正确率:${qTotal>0?Math.round(qCorrect/qTotal*100):0}% (${qCorrect}/${qTotal})</div><button class="quiz-next-btn" onclick="buildQuiz()">再来一轮</button></div>`;return}const r=qQueue[qIdx];qAnswered=false;if(qMode==='category'){const cats=[...new Set(RECIPES.map(d=>d.category))];const wrong=cats.filter(c=>c!==r.category).sort(()=>Math.random()-.5).slice(0,3);const opts=[r.category,...wrong].sort(()=>Math.random()-.5);let h=`<div class="quiz-question">「${r.name}」属于哪个分类?</div><div class="quiz-sub">点击正确答案</div><div class="quiz-options">`;opts.forEach(o=>h+=`<div class="quiz-option" data-correct="${o===r.category}" onclick="answerQuiz(this)">${o}</div>`);h+='</div>';document.getElementById('quiz-container').innerHTML=h}else if(qMode==='name'){const recipeStr=r.cold||'';const others=RECIPES.filter(d=>d.id!==r.id).sort(()=>Math.random()-.5).slice(0,3);const opts=[r,...others].sort(()=>Math.random()-.5);let h=`<div class="quiz-question">配方如下:</div><div class="quiz-sub" style="font-size:13px;color:var(--primary);margin-bottom:12px;max-height:80px;overflow:hidden">${recipeStr.substring(0,120)}</div><div class="quiz-sub">猜猜是哪款?</div><div class="quiz-options">`;opts.forEach(d=>h+=`<div class="quiz-option" data-correct="${d.id===r.id}" onclick="answerQuiz(this)">${d.name}</div>`);h+='</div>';document.getElementById('quiz-container').innerHTML=h}else{let h=`<div class="quiz-question">「${r.name}」</div><div class="quiz-sub">配方是?</div><div class="quiz-options">`;const fake=RECIPES.filter(d=>d.id!==r.id).sort(()=>Math.random()-.5).slice(0,3);const ch=[{t:r.cold||r.hot||'',c:true},...fake.map(d=>({t:d.cold||d.hot||'',c:false}))].filter(x=>x.t).sort(()=>Math.random()-.5);ch.forEach(x=>h+=`<div class="quiz-option" data-correct="${x.c}" onclick="answerQuiz(this)">${x.t.substring(0,100)}</div>`);h+='</div>';document.getElementById('quiz-container').innerHTML=h}}
function answerQuiz(el){if(qAnswered)return;qAnswered=true;qTotal++;if(el.dataset.correct==='true'){qCorrect++;el.classList.add('correct')}else{el.classList.add('wrong');document.querySelectorAll('.quiz-option').forEach(o=>{if(o.dataset.correct==='true')o.classList.add('revealed');o.classList.add('disabled')})}document.getElementById('quiz-correct').textContent=qCorrect;document.getElementById('quiz-total').textContent=qTotal;const nb=document.createElement('button');nb.className='quiz-next-btn';nb.textContent=qIdx<qQueue.length-1?'下一题 →':'查看结果';nb.onclick=()=>{qIdx++;showQuestion()};const c=document.getElementById('quiz-container');if(!c.querySelector('.quiz-next-btn'))c.appendChild(nb)}

function renderBrowseList(){const s=document.getElementById('browse-search').value.toLowerCase();const f=document.getElementById('browse-filter').value;let filtered=RECIPES.filter(r=>{if(f!=='all'&&r.category!==f)return false;if(s&&!r.name.toLowerCase().includes(s)&&!r.category.toLowerCase().includes(s))return false;return true});const list=document.getElementById('browse-list');if(!filtered.length){list.innerHTML='<div class="browse-empty">没有匹配的饮品 🫗</div>';return}list.innerHTML=filtered.map(r=>{const lines=[];if(r.cold)lines.push(`<div class="recipe-row"><span class="recipe-temp temp-cold">❄</span><span class="recipe-formula">${r.cold}</span></div>`);if(r.hot)lines.push(`<div class="recipe-row"><span class="recipe-temp temp-hot">🔥</span><span class="recipe-formula">${r.hot}</span></div>`);const n=r.note?`<div class="recipe-note">${r.note}</div>`:'';const summary=r.cold||r.hot||'';return`<div class="browse-item" onclick="this.querySelector('.bi-expand').classList.toggle('open')"><div class="bi-header"><span class="bi-name">${r.name}</span><span class="bi-cat">${r.category}</span></div><div class="bi-summary">${summary.substring(0,80)}${summary.length>80?'…':''}</div><div class="bi-expand">${lines.join('')}${n}</div></div>`}).join('')}
document.getElementById('browse-search').addEventListener('input',renderBrowseList);
document.getElementById('browse-filter').addEventListener('change',renderBrowseList);

function updateStats(){const d=loadSR();let known=0,learning=0,weak=RECIPES.length;RECIPES.forEach(r=>{const s=d[r.id];if(s&&s.totalAttempts>0){weak--;if(s.level>=4)known++;else if(s.level>=2)learning++}});document.getElementById('stat-total').textContent=RECIPES.length;document.getElementById('stat-known').textContent=known;document.getElementById('stat-learning').textContent=learning;document.getElementById('stat-weak').textContent=weak}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById('panel-'+b.dataset.tab).classList.add('active');if(b.dataset.tab==='flashcard')buildQueue();if(b.dataset.tab==='quiz')buildQuiz();if(b.dataset.tab==='browse')renderBrowseList()}));
document.querySelectorAll('[data-fmode]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-fmode]').forEach(x=>x.classList.remove('active'));b.classList.add('active');fcMode=b.dataset.fmode;buildQueue()}));
document.querySelectorAll('[data-qmode]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-qmode]').forEach(x=>x.classList.remove('active'));b.classList.add('active');qMode=b.dataset.qmode;buildQuiz()}));
document.getElementById('reset-btn').addEventListener('click',()=>{if(confirm('确定重置所有学习进度?')){resetAllSR();buildQueue()}});

buildQueue();updateStats();
</script>
